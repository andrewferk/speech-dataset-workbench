name: CI

on:
  push:
    branches: [main]
  pull_request:

# Single-OS on the pinned Python floor; the cross-arch normalization caveat of ADR-0005 is
# documented, not CI-enforced (ADR-0008).
jobs:
  # CI provisions Python through setup-uv, so nothing else here exercises mise.toml. Without
  # this job a syntax error in it reaches main with CI green, breaking every contributor's
  # shell while the test suite still passes. `mise ls` exits non-zero on a parse error.
  mise-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install: false
      - name: mise.toml parses
        run: |
          mise trust "$GITHUB_WORKSPACE/mise.toml"
          mise ls

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # The floor, pinned explicitly: requires-python is a range, so without this the
          # runner's default interpreter could drift off 3.13 unnoticed.
          python-version-file: .python-version

      - name: Install the pinned toolchain
        run: uv sync --locked

      # Runs from outside the checkout with no PYTHONPATH set anywhere, asserting the three
      # properties ADR-0014 buys: the console script resolves, the package imports without
      # environment help, and the CLI works when the user's data is not in the repo. The
      # last is the sharp edge that ruled out a flat layout, so it does not go untested.
      - name: sdw runs from an unrelated directory
        run: cd "$(mktemp -d)" && uv run --project "$GITHUB_WORKSPACE" sdw --help

      - name: ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: mypy --strict
        run: uv run mypy --strict

      # Coverage is measured, not enforced: no pass/fail percentage (ADR-0008).
      - name: pytest
        run: uv run pytest
